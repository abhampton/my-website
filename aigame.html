<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Oracle's Trial</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Cinzel', Georgia, serif;
      background: #1a1030;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh;
      color: #e8e4ff;
    }
    .spellbook {
      background: #110c22;
      border: 1px solid #534AB7;
      border-radius: 20px;
      padding: 2.5rem 2rem 2.5rem;
      max-width: 460px; width: 100%;
      text-align: center;
    }
    .eyebrow { font-size: 11px; letter-spacing: 0.15em; color: #7F77DD; margin-bottom: 6px; }
    h2 { font-size: 22px; font-weight: 600; color: #e8e4ff; margin-bottom: 4px; }
    .subtitle { font-size: 11px; letter-spacing: 0.06em; color: #888; margin-bottom: 1.25rem; }
    .orb-row { display: flex; justify-content: center; gap: 16px; margin-bottom: 1.5rem; }
    .orb {
      width: 22px; height: 22px; border-radius: 50%;
      border: 1.5px solid #534AB7; background: #1e1540;
      transition: all 0.4s;
    }
    .orb.lit { background: #7F77DD; border-color: #AFA9EC; box-shadow: 0 0 10px #7F77DD; }
    .orb.shatter { background: #E24B4A; border-color: #A32D2D; animation: shatter 0.4s ease; }
    @keyframes shatter { 0%{transform:scale(1.3)} 50%{transform:scale(0.7) rotate(20deg)} 100%{transform:scale(1)} }
    .crystal {
      width: 100px; height: 100px; border-radius: 50%;
      background: #1e1540; border: 2px solid #534AB7;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 0.75rem; transition: all 0.4s;
    }
    .crystal.glow-correct { background: #2d2060; border-color: #AFA9EC; box-shadow: 0 0 24px #7F77DD; animation: pulse 0.5s ease; }
    .crystal.glow-wrong { background: #2a0d0d; border-color: #E24B4A; animation: tremble 0.4s ease; }
    .crystal.win-glow { background: #2a1e00; border-color: #EF9F27; box-shadow: 0 0 30px #FAC775; animation: pulse 0.6s ease infinite alternate; }
    @keyframes pulse { 0%{transform:scale(1)} 50%{transform:scale(1.07)} 100%{transform:scale(1)} }
    @keyframes tremble { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 60%{transform:translateX(6px)} }
    .crystal-symbol { font-size: 38px; line-height: 1; user-select: none; color: #AFA9EC; }
    .incantation { font-size: 16px; font-weight: 600; min-height: 24px; letter-spacing: 0.04em; color: #AFA9EC; margin-bottom: 4px; transition: all 0.2s; }
    .incantation.wrong { color: #E24B4A; }
    .incantation.correct { color: #9FE1CB; }
    .prophecy { font-size: 12px; letter-spacing: 0.06em; color: #666; min-height: 18px; margin-bottom: 1rem; }
    .divider { width: 60px; height: 1px; background: #534AB7; margin: 0.75rem auto; }
    .rune-row { display: flex; justify-content: center; gap: 14px; margin: 1rem 0; }
    .rune-wrap { display: flex; flex-direction: column; align-items: center; }
    .rune-btn {
      width: 80px; height: 80px; border-radius: 50%;
      border: 1.5px solid #534AB7; background: #1e1540;
      color: #AFA9EC; font-family: 'Cinzel', Georgia, serif;
      font-size: 26px; font-weight: 600; cursor: pointer;
      transition: all 0.18s;
    }
    .rune-btn:hover { background: #2d2060; border-color: #7F77DD; transform: scale(1.08); }
    .rune-btn:active { transform: scale(0.95); }
    .rune-btn:disabled { opacity: 0.3; cursor: default; transform: none; }
    .rune-label { font-size: 10px; letter-spacing: 0.1em; color: #534AB7; margin-top: 4px; }
    .scroll-row { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; min-height: 22px; margin: 0.75rem 0 0.25rem; }
    .scroll-tag { font-size: 11px; padding: 2px 10px; border-radius: 99px; background: #1e1540; color: #7F77DD; border: 0.5px solid #534AB7; letter-spacing: 0.03em; }
    .hint-line { font-size: 11px; color: #555; letter-spacing: 0.05em; min-height: 16px; }
    .cast-again {
      display: none; margin-top: 1.25rem; padding: 10px 28px;
      font-size: 12px; letter-spacing: 0.1em; border-radius: 99px;
      border: 1px solid #534AB7; background: #1e1540; color: #AFA9EC;
      cursor: pointer; font-family: 'Cinzel', Georgia, serif; transition: all 0.2s;
    }
    .cast-again:hover { background: #2d2060; }
    .cast-again.show { display: inline-block; }
  </style>
</head>
<body>
<div class="spellbook">
  <p class="eyebrow">THE ORACLE'S TRIAL</p>
  <h2>Peer into the mystic</h2>
  <p class="subtitle">Channel your sight — reveal the rune thrice to prove yourself</p>

  <div class="orb-row">
    <div class="orb" id="d0"></div>
    <div class="orb" id="d1"></div>
    <div class="orb" id="d2"></div>
  </div>

  <div class="crystal" id="crystal">
    <span class="crystal-symbol" id="crystalSymbol">&#9670;</span>
  </div>

  <div class="incantation" id="incantation"></div>
  <div class="prophecy" id="prophecy">The numbers are veiled. Choose wisely.</div>

  <div class="divider"></div>

  <div class="rune-row">
    <div class="rune-wrap">
      <button class="rune-btn" onclick="guess(1)">I</button>
      <span class="rune-label">ONE</span>
    </div>
    <div class="rune-wrap">
      <button class="rune-btn" onclick="guess(2)">II</button>
      <span class="rune-label">TWO</span>
    </div>
    <div class="rune-wrap">
      <button class="rune-btn" onclick="guess(3)">III</button>
      <span class="rune-label">THREE</span>
    </div>
  </div>

  <div class="scroll-row" id="scrollRow"></div>
  <div class="hint-line" id="hintLine"></div>
  <button class="cast-again" id="castAgain" onclick="resetGame()">Cast again</button>
</div>

<script>
  const symbols = ['&#9670;','&#9651;','&#9711;','&#9768;','&#10022;','&#9767;'];
  const correctSyms = ['&#10022;','&#9670;','&#9651;'];
  const wrongSyms = ['&#9760;','&#8982;','&#9532;'];
  let streak = 0, gameOver = false, roundCount = 0, current = rand();

  function rand() { return Math.floor(Math.random()*3)+1; }
  function toRoman(n) { return ['I','II','III'][n-1]; }

  function guess(n) {
    if (gameOver) return;
    roundCount++;
    const prev = current;
    const ok = n === prev;
    addScroll(n, prev);
    const crystal = document.getElementById('crystal');
    const sym = document.getElementById('crystalSymbol');
    if (ok) {
      streak++;
      markOrb(streak-1, true);
      crystal.className = 'crystal glow-correct';
      sym.innerHTML = correctSyms[(streak-1)%3];
      setMsg(pickCorrect(), 'correct');
      document.getElementById('hintLine').textContent = '';
      if (streak===3) { win(); return; }
      document.getElementById('prophecy').textContent = streak===2 ? 'The veil thins... one more.' : 'The oracle nods. Continue.';
    } else {
      resetOrbs();
      crystal.className = 'crystal glow-wrong';
      sym.innerHTML = wrongSyms[Math.floor(Math.random()*3)];
      setMsg(pickWrong(), 'wrong');
      document.getElementById('prophecy').textContent = 'The rune was ' + toRoman(prev) + '. The mists reset.';
      document.getElementById('hintLine').textContent = 'Your streak has been undone.';
      streak = 0;
    }
    setTimeout(() => { if (!gameOver) { crystal.className='crystal'; sym.innerHTML=symbols[Math.floor(Math.random()*symbols.length)]; } }, 900);
    current = rand();
  }

  function markOrb(i, ok) {
    const d = document.getElementById('d'+i);
    d.classList.add(ok?'lit':'shatter');
    if (!ok) setTimeout(()=>d.classList.remove('shatter'),500);
  }

  function resetOrbs() {
    for(let i=0;i<streak;i++){
      const d=document.getElementById('d'+i);
      d.classList.remove('lit'); d.classList.add('shatter');
      setTimeout(()=>d.classList.remove('shatter'),500);
    }
  }

  function setMsg(text, cls) {
    const el = document.getElementById('incantation');
    el.textContent = text; el.className = 'incantation '+cls;
  }

  function addScroll(g, a) {
    const row = document.getElementById('scrollRow');
    if (row.children.length > 5) row.removeChild(row.firstChild);
    const tag = document.createElement('span');
    tag.className = 'scroll-tag';
    tag.textContent = toRoman(g)+' / '+toRoman(a);
    row.appendChild(tag);
  }

  function pickCorrect() { return ['The oracle speaks true!','Your sight is clear!','The spirits confirm!','Foreseen!','Mystic alignment!'][Math.floor(Math.random()*5)]; }
  function pickWrong() { return ['The veil deceives...','A false vision.','The spirits deny.','Not this rune.','The mists cloud you.'][Math.floor(Math.random()*5)]; }

  function win() {
    gameOver = true;
    document.getElementById('crystal').className = 'crystal win-glow';
    document.getElementById('crystalSymbol').innerHTML = '&#9733;';
    setMsg('You are the Oracle!', 'correct');
    document.getElementById('prophecy').textContent = 'Three true visions. The spirits bow to you.';
    document.getElementById('hintLine').textContent = 'Completed in '+roundCount+' summons.';
    document.querySelectorAll('.rune-btn').forEach(b=>b.disabled=true);
    document.getElementById('castAgain').classList.add('show');
  }

  function resetGame() {
    streak=0; gameOver=false; roundCount=0; current=rand();
    for(let i=0;i<3;i++){const d=document.getElementById('d'+i);d.classList.remove('lit','shatter');}
    document.getElementById('crystal').className='crystal';
    document.getElementById('crystalSymbol').innerHTML='&#9670;';
    document.getElementById('incantation').textContent='';
    document.getElementById('incantation').className='incantation';
    document.getElementById('prophecy').textContent='The numbers are veiled. Choose wisely.';
    document.getElementById('hintLine').textContent='';
    document.getElementById('scrollRow').innerHTML='';
    document.querySelectorAll('.rune-btn').forEach(b=>b.disabled=false);
    document.getElementById('castAgain').classList.remove('show');
  }
</script>
</body>
</html>
